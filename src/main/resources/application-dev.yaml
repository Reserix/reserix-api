server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reserix_db
    username: reserix_user
    password: reserix_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true