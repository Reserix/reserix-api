server:
  port: 8080

jwt:
  secret: "secret999999999999999999999999999999999999999999999999999999"
  access-token-expiration-ms: 3600000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reserix_db
    username: reserix_user
    password: reserix_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true